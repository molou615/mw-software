name: Send Follow-Ups
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
jobs:
  send-followups:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install nodemailer
      - run: node send-followups.js
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      - run: |
          git config user.name "Follow-Up Bot"
          git config user.email "bot@halaflow.app"
          git add sent-log.json
          git diff --staged --quiet || git commit -m "Update follow-up log"
          git push
